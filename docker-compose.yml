

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=task_tracker;User=sa;Password=new_password;TrustServerCertificate=true;
    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: new_password
      ACCEPT_EULA: "Y" 
    ports:
      - "1433:1433"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: